global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m

frontend kubernetes_api
    bind *:6443
    default_backend talos_control_planes

backend talos_control_planes
    balance roundrobin
    default-server inter 2s fall 3 rise 2 check

    server mbhome-talos-cp-01 10.20.30.70:6443
    # Enable these after the extra control-plane nodes exist.
    # server mbhome-talos-cp-02 10.20.30.71:6443
    # server mbhome-talos-cp-03 10.20.30.72:6443

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 10s
