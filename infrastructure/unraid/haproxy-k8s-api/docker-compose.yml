services:
  haproxy-k8s-api:
    image: haproxy:3.0-alpine
    container_name: haproxy-k8s-api
    restart: unless-stopped
    ports:
      - "6443:6443"
      - "8404:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 5s
      retries: 3
