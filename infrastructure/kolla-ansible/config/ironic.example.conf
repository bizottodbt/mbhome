[oslo_policy]
# Allow project-scoped tokens (e.g. Horizon) to access Ironic APIs.
# Without this, Ironic rejects any non-system-scoped request regardless
# of the policy rules.
enforce_scope = false
enforce_new_defaults = false

[conductor]
# automated_clean is controlled per-node via the node definition (automated_clean: true/false).
# The global default is false — nodes that need cleaning set it explicitly.
automated_clean = false

[deploy]
# Disable full block-device erasure (erase_devices step) during cleaning.
# The default method tries ATA Secure Erase then shred — both can fail on consumer
# SSDs (e.g. Intenso) that don't support ATA Secure Erase, causing "No HardwareManager".
# Setting priority to 0 skips this step. erase_devices_metadata (priority 10 by default)
# still runs — it zeroes partition headers, which is sufficient to prepare the disk for
# re-deployment without requiring hardware-level erasure support.
erase_devices_priority = 0
erase_devices_metadata_priority = 10

[neutron]
# Required by the flat network interface: tells Ironic which Neutron network
# to create VIF ports on during deployment.
provisioning_network = 00000000-0000-0000-0000-000000000000

[dhcp]
# noop network interface skips VIF creation, so Ironic cannot update DHCP
# options via Neutron. Set provider to none — Kolla's ironic-dnsmasq container
# handles PXE DHCP from the registered port MACs directly.
dhcp_provider = none

[pxe]
# Explicitly pass the Ironic API URL to IPA via kernel cmdline so it can heartbeat.
# Without this, IPA falls back to mDNS (which fails on this network).
# Note: kernel_append_params is the current name (pxe_append_params deprecated in Zed).
pxe_append_params = ipa-api-url=http://192.0.2.10:6385 systemd.journald.forward_to_console=yes
kernel_append_params = ipa-api-url=http://192.0.2.10:6385 systemd.journald.forward_to_console=yes
# Default is 20480 MiB, which is smaller than the current Proxmox raw image
# (~21005 MiB). Keep enough master-image cache for repeated deploys.
image_cache_size = 65536
