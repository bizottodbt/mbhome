# Tinkerbell Template for Proxmox VE installation onto MJ11-EC1 M.2 NVMe.
#
# This template streams a Proxmox disk image to /dev/nvme0n1 and reboots.
# You must build or host a raw Proxmox image accessible via smee HTTP
# (http://10.20.30.200:8080) before triggering workflows.
#
# Image preparation options:
#   - Use Packer (packer/proxmox/) to build a raw image — Phase 2
#   - Download official Proxmox ISO and convert: qemu-img convert proxmox.iso proxmox-ve.raw
---
apiVersion: tinkerbell.org/v1alpha1
kind: Template
metadata:
  name: proxmox-install
  namespace: tink-system
spec:
  data: |
    version: "0.1"
    name: proxmox-install
    global_timeout: 1800
    tasks:
      - name: "os-installation"
        worker: "{{.device_1}}"
        volumes:
          - /dev:/dev
          - /dev/console:/dev/console
          - /lib/firmware:/lib/firmware:ro
        actions:
          - name: "stream-proxmox-image"
            image: quay.io/tinkerbell-actions/image2disk:v1.0.0
            timeout: 900
            environment:
              DEST_DISK: /dev/nvme0n1
              IMG_URL: "http://10.20.30.200:8080/proxmox-ve.raw"
              COMPRESSED: "false"
          - name: "reboot"
            image: public.ecr.aws/l0g8r8j6/tinkerbell/actions/reboot:v1.0.0
            timeout: 90
            volumes:
              - /worker:/worker
