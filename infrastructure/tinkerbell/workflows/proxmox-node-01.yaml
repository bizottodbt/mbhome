# Workflow to provision Proxmox onto node 01.
# Apply after populating hardware/proxmox-node-01.yaml with MAC and IP.
---
apiVersion: tinkerbell.org/v1alpha1
kind: Workflow
metadata:
  name: proxmox-node-01
  namespace: tink-system
spec:
  templateRef: proxmox-install
  hardwareRef: proxmox-node-01
  hardwareMap:
    device_1: ""  # TODO: set to MAC address matching hardware/proxmox-node-01.yaml
