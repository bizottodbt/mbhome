---
- name: Reconcile declarative Active Directory objects
  hosts: windows_ad_primary
  gather_facts: false

  vars:
    _ad_directory_state_path: "{{ playbook_dir }}/../../ad/directory.local.yaml"
    _ad_directory_remote_state_path: C:\Windows\Temp\mbhome-ad-directory-state.json
    _ad_directory_remote_script_path: C:\Windows\Temp\mbhome-ad-directory-reconcile.ps1
    _ad_directory_check: "{{ ad_directory_check | default(false) | bool }}"

  tasks:
    - name: Load local AD directory desired state
      ansible.builtin.include_vars:
        file: "{{ _ad_directory_state_path }}"
        name: ad_directory
      no_log: true

    - name: Validate AD directory desired state
      ansible.builtin.assert:
        that:
          - ad_directory.domain is defined
          - ad_directory.domain | length > 0
          - ad_directory.domain is match('^[A-Za-z0-9-]+(\\.[A-Za-z0-9-]+)+$')
          - ad_directory.base_dn is defined
          - ad_directory.base_dn | length > 0
          - ad_directory.ous is defined
          - ad_directory.groups is defined
          - ad_directory.users is defined
          - ad_directory.service_accounts is defined
        fail_msg: >-
          infrastructure/ad/directory.local.yaml must define domain, base_dn,
          ous, groups, users, and service_accounts.

    - name: Wait for WinRM
      ansible.builtin.wait_for_connection:
        timeout: "{{ windows_wait_timeout | default(600) }}"

    - name: Copy AD directory desired state to primary DC
      ansible.windows.win_copy:
        content: "{{ ad_directory | to_json }}"
        dest: "{{ _ad_directory_remote_state_path }}"
      no_log: true

    - name: Copy AD directory reconciler script to primary DC
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/templates/windows-ad-directory-reconcile.ps1"
        dest: "{{ _ad_directory_remote_script_path }}"

    - name: Reconcile AD directory desired state
      ansible.windows.win_shell: >-
        & "{{ _ad_directory_remote_script_path }}"
        -StatePath "{{ _ad_directory_remote_state_path }}"
        -CheckMode:{{ _ad_directory_check | ternary('$true', '$false') }}
      register: _ad_directory_reconcile
      changed_when: >-
        not _ad_directory_check and
        'CHANGED=True' in _ad_directory_reconcile.stdout
      check_mode: false

    - name: Remove temporary AD directory files
      ansible.windows.win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ _ad_directory_remote_state_path }}"
        - "{{ _ad_directory_remote_script_path }}"

    - name: Report AD directory reconciliation output
      ansible.builtin.debug:
        var: _ad_directory_reconcile.stdout_lines
