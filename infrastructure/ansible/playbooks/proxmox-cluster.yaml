---
- name: Prepare Proxmox cluster membership
  hosts: "{{ target_hosts | default('proxmox_nodes') }}"
  become: true
  gather_facts: false
  vars:
    proxmox_api_users_file: "{{ playbook_dir }}/../vars/proxmox-api-users.local.yaml"
    proxmox_api_token_output_file: "{{ playbook_dir }}/../vars/proxmox-api-tokens.local.generated"
    _proxmox_cluster_primary: "{{ proxmox_cluster_primary | default(groups['proxmox_nodes'] | first) }}"
    _proxmox_cluster_name: "{{ proxmox_cluster_name | default('mbhome') }}"
    _proxmox_cluster_link_address_var: "{{ proxmox_cluster_link_address_var | default('ansible_host') }}"
    _proxmox_cluster_node_address: "{{ hostvars[inventory_hostname][_proxmox_cluster_link_address_var] | default(ansible_host | default(inventory_hostname)) }}"
    _proxmox_cluster_primary_address: "{{ hostvars[_proxmox_cluster_primary][_proxmox_cluster_link_address_var] | default(hostvars[_proxmox_cluster_primary].ansible_host | default(_proxmox_cluster_primary)) }}"

  pre_tasks:
    - name: Check for local Proxmox API user vars
      ansible.builtin.stat:
        path: "{{ proxmox_api_users_file }}"
      delegate_to: localhost
      become: false
      register: _proxmox_api_users_file

    - name: Load local Proxmox API user vars
      ansible.builtin.include_vars:
        file: "{{ proxmox_api_users_file }}"
      no_log: true
      when: _proxmox_api_users_file.stat.exists

    - name: Require primary node to be in the play
      ansible.builtin.assert:
        that:
          - _proxmox_cluster_primary in ansible_play_hosts
        fail_msg: >-
          Proxmox cluster primary {{ _proxmox_cluster_primary }} is not in this
          play. Include it in LIMIT or set proxmox_cluster_primary correctly.
      run_once: true

    - name: Require cluster node connection addresses
      ansible.builtin.assert:
        that:
          - _proxmox_cluster_node_address | length > 0
        fail_msg: >-
          Missing Proxmox cluster link address for {{ inventory_hostname }}.
          Set ansible_host or {{ _proxmox_cluster_link_address_var }}.

  tasks:
    - name: Keep Proxmox node names resolvable on every cluster member
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED PROXMOX CLUSTER HOSTS"
        block: |
          {% for node in ansible_play_hosts | sort %}
          {{ hostvars[node][_proxmox_cluster_link_address_var] | default(hostvars[node].ansible_host | default(node)) }} {{ node }}
          {% endfor %}

    - name: Check whether node is already clustered
      ansible.builtin.stat:
        path: /etc/pve/corosync.conf
      register: _proxmox_cluster_config

    - name: Record cluster membership state
      ansible.builtin.set_fact:
        _proxmox_is_clustered: "{{ _proxmox_cluster_config.stat.exists | bool }}"

    - name: Ensure root SSH directory exists on join nodes
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Create root SSH key for non-interactive cluster join
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -t
          - ed25519
          - -N
          - ""
          - -f
          - /root/.ssh/id_ed25519
      args:
        creates: /root/.ssh/id_ed25519
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Read join node root SSH public keys
      ansible.builtin.slurp:
        src: /root/.ssh/id_ed25519.pub
      register: _proxmox_join_root_public_key
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Authorize join node root SSH keys on the primary
      ansible.posix.authorized_key:
        user: root
        key: "{{ hostvars[item]._proxmox_join_root_public_key.content | b64decode }}"
        state: present
        comment: "proxmox-cluster-join {{ item }}"
      loop: "{{ ansible_play_hosts | difference([_proxmox_cluster_primary]) }}"
      delegate_to: "{{ _proxmox_cluster_primary }}"
      when:
        - hostvars[item]._proxmox_join_root_public_key is defined
        - not hostvars[item]._proxmox_is_clustered | bool
      run_once: true

    - name: Trust primary host key on join nodes
      ansible.builtin.shell: |
        set -e
        ssh-keygen -R "{{ _proxmox_cluster_primary_address }}" >/dev/null 2>&1 || true
        ssh-keyscan -H "{{ _proxmox_cluster_primary_address }}" >> /root/.ssh/known_hosts
      args:
        executable: /bin/bash
      changed_when: true
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Create Proxmox cluster on primary
      ansible.builtin.command:
        argv:
          - pvecm
          - create
          - "{{ _proxmox_cluster_name }}"
          - --link0
          - "{{ _proxmox_cluster_node_address }}"
      register: _proxmox_cluster_create
      changed_when: true
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Wait for primary cluster filesystem
      ansible.builtin.wait_for:
        path: /etc/pve/corosync.conf
        timeout: 120
      when:
        - inventory_hostname == _proxmox_cluster_primary

    - name: Join Proxmox cluster from secondary nodes
      ansible.builtin.command:
        argv:
          - pvecm
          - add
          - "{{ _proxmox_cluster_primary_address }}"
          - --use_ssh
          - "1"
          - --link0
          - "{{ _proxmox_cluster_node_address }}"
      register: _proxmox_cluster_join
      changed_when: true
      throttle: 1
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Print Proxmox cluster join output
      ansible.builtin.debug:
        msg: "{{ (_proxmox_cluster_join.stdout_lines | default([])) + (_proxmox_cluster_join.stderr_lines | default([])) }}"
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - _proxmox_cluster_join is defined
        - _proxmox_cluster_join is changed

    - name: Wait for secondary cluster filesystem
      ansible.builtin.wait_for:
        path: /etc/pve/corosync.conf
        timeout: 180
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Refresh cluster membership state
      ansible.builtin.stat:
        path: /etc/pve/corosync.conf
      register: _proxmox_cluster_config_after

    - name: Confirm every target node is clustered
      ansible.builtin.assert:
        that:
          - _proxmox_cluster_config_after.stat.exists
        fail_msg: "{{ inventory_hostname }} is not clustered after proxmox-cluster run."
        success_msg: "{{ inventory_hostname }} is clustered."

    - name: Show Proxmox cluster status
      ansible.builtin.command:
        argv:
          - pvecm
          - status
      register: _proxmox_cluster_status
      changed_when: false
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Print Proxmox cluster status
      ansible.builtin.debug:
        var: _proxmox_cluster_status.stdout_lines
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Configure Proxmox cluster migration settings
      ansible.builtin.command:
        argv:
          - pvesh
          - set
          - /cluster/options
          - --migration
          - >-
            {{
              (
                ['type=' ~ (proxmox_cluster_migration.type | default('secure'))]
                + (
                  ['network=' ~ proxmox_cluster_migration.network]
                  if proxmox_cluster_migration.network | default('') | length > 0
                  else []
                )
              ) | join(',')
            }}
      changed_when: false
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - proxmox_cluster_migration is defined

    - name: Read Proxmox cluster NFS storage configs
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - "/storage/{{ item.storage }}"
          - --output-format
          - json
      register: _proxmox_cluster_nfs_storage_configs
      changed_when: false
      failed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Recreate Proxmox cluster NFS storages with immutable drift
      ansible.builtin.command:
        argv:
          - pvesm
          - remove
          - "{{ item.item.storage }}"
      changed_when: true
      loop: "{{ _proxmox_cluster_nfs_storage_configs.results | default([]) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - item.rc == 0
        - >-
          (((item.stdout | default('{}', true)) | from_json).server | default('')) != (item.item.server | string) or
          (((item.stdout | default('{}', true)) | from_json).export | default('')) != (item.item.export | string) or
          (
            item.item.options is defined and
            (((item.stdout | default('{}', true)) | from_json).options | default('')) != (item.item.options | string)
          ) or
          (
            item.item.options is not defined and
            (((item.stdout | default('{}', true)) | from_json).options | default('')) | length > 0
          )

    - name: Add missing or recreated Proxmox cluster NFS storages
      ansible.builtin.command:
        argv: >-
          {{
            [
              'pvesm',
              'add',
              'nfs',
              item.item.storage,
              '--server',
              item.item.server,
              '--export',
              item.item.export,
              '--content',
              item.item.content | default(['images']) | join(',')
            ]
            + (['--options', item.item.options] if item.item.options is defined else [])
            + (['--nodes', item.item.nodes | join(',')] if item.item.nodes is defined else [])
          }}
      changed_when: true
      loop: "{{ _proxmox_cluster_nfs_storage_configs.results | default([]) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - >-
          item.rc != 0 or
          (((item.stdout | default('{}', true)) | from_json).server | default('')) != (item.item.server | string) or
          (((item.stdout | default('{}', true)) | from_json).export | default('')) != (item.item.export | string) or
          (
            item.item.options is defined and
            (((item.stdout | default('{}', true)) | from_json).options | default('')) != (item.item.options | string)
          ) or
          (
            item.item.options is not defined and
            (((item.stdout | default('{}', true)) | from_json).options | default('')) | length > 0
          )

    - name: Align Proxmox cluster NFS storage content and options
      ansible.builtin.command:
        argv: >-
          {{
            [
              'pvesm',
              'set',
              item.storage,
              '--content',
              item.content | default(['images']) | join(',')
            ]
            + (['--options', item.options] if item.options is defined else [])
            + (['--nodes', item.nodes | join(',')] if item.nodes is defined else [])
          }}
      changed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Read Proxmox cluster NFS storage configs after alignment
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - "/storage/{{ item.storage }}"
          - --output-format
          - json
      register: _proxmox_cluster_nfs_storage_configs_after_alignment
      changed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Assert Proxmox cluster NFS storage configs use desired sources
      ansible.builtin.assert:
        that:
          - "(((item.stdout | default('{}', true)) | from_json).server | default('')) == (item.item.server | string)"
          - "(((item.stdout | default('{}', true)) | from_json).export | default('')) == (item.item.export | string)"
        fail_msg: >-
          Proxmox storage {{ item.item.storage }} config does not match desired
          source {{ item.item.server }}:{{ item.item.export }}.
          Current config:
          {{ item.stdout | default('') }}
      loop: "{{ _proxmox_cluster_nfs_storage_configs_after_alignment.results | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Check mounted Proxmox cluster NFS storage sources
      ansible.builtin.command:
        argv:
          - findmnt
          - --list
          - -n
          - -t
          - nfs,nfs4
          - -o
          - SOURCE
          - --mountpoint
          - "/mnt/pve/{{ item.storage }}"
      register: _proxmox_cluster_nfs_mount_sources
      changed_when: false
      failed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"

    - name: Disable Proxmox cluster NFS storages with stale mounts before remount
      ansible.builtin.command:
        argv:
          - pvesm
          - set
          - "{{ item.item.storage }}"
          - --disable
          - "1"
      changed_when: true
      loop: "{{ _proxmox_cluster_nfs_mount_sources.results | default([]) }}"
      when:
        - item.rc == 0
        - >-
          (item.stdout_lines | default([])) !=
          [((item.item.server | string) ~ ':' ~ (item.item.export | string))]

    - name: Stop Proxmox storage status daemon before stale NFS unmounts
      ansible.builtin.systemd:
        name: pvestatd
        state: stopped
      when: >-
        _proxmox_cluster_nfs_mount_sources.results | default([])
        | selectattr('rc', 'eq', 0)
        | list
        | length > 0

    - name: Unmount Proxmox cluster NFS storage mounts before remount
      ansible.builtin.shell: |
        set -eu
        target="/mnt/pve/{{ item.item.storage }}"

        while findmnt --list -n -t nfs,nfs4 -o SOURCE --mountpoint "$target" >/dev/null; do
          umount "$target"
        done
      register: _proxmox_cluster_nfs_stale_unmounts
      changed_when: true
      failed_when: false
      loop: "{{ _proxmox_cluster_nfs_mount_sources.results | default([]) }}"
      when:
        - item.rc == 0
        - >-
          (item.stdout_lines | default([])) !=
          [((item.item.server | string) ~ ':' ~ (item.item.export | string))]

    - name: Re-enable Proxmox cluster NFS storages after stale remount handling
      ansible.builtin.command:
        argv:
          - pvesm
          - set
          - "{{ item.storage }}"
          - --disable
          - "0"
      changed_when: true
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"
      when: _proxmox_cluster_nfs_stale_unmounts is changed

    - name: Start Proxmox storage status daemon after stale NFS unmounts
      ansible.builtin.systemd:
        name: pvestatd
        state: started
      when: >-
        _proxmox_cluster_nfs_mount_sources.results | default([])
        | selectattr('rc', 'eq', 0)
        | list
        | length > 0

    - name: Assert stale Proxmox cluster NFS unmounts succeeded
      ansible.builtin.assert:
        that:
          - item.rc == 0
        fail_msg: >-
          Could not unmount stale Proxmox storage {{ item.item.item.storage | default(item.item.storage | default('unknown')) }}
          from /mnt/pve/{{ item.item.item.storage | default(item.item.storage | default('unknown')) }}. It may still be in use by
          a VM, ISO, backup job, shell, or pvedaemon task. Stop users of the
          storage and rerun proxmox-cluster.
          stderr: {{ item.stderr | default('') }}
      loop: "{{ _proxmox_cluster_nfs_stale_unmounts.results | default([]) }}"
      when:
        - _proxmox_cluster_nfs_stale_unmounts is defined
        - not (item.skipped | default(false))

    - name: Activate/check Proxmox cluster NFS storages
      ansible.builtin.command:
        argv:
          - pvesm
          - status
          - --storage
          - "{{ item.storage }}"
      changed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"

    - name: Confirm Proxmox cluster NFS storage mounts use desired sources
      ansible.builtin.command:
        argv:
          - findmnt
          - --list
          - -n
          - -t
          - nfs,nfs4
          - -o
          - SOURCE
          - --mountpoint
          - "/mnt/pve/{{ item.storage }}"
      register: _proxmox_cluster_nfs_mount_sources_after
      changed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"

    - name: Assert Proxmox cluster NFS storage mounts use desired sources
      ansible.builtin.assert:
        that:
          - "item.stdout_lines | default([]) | length == 1"
          - "item.stdout_lines[0] == ((item.item.server | string) ~ ':' ~ (item.item.export | string))"
        fail_msg: >-
          Proxmox storage {{ item.item.storage }} is mounted from sources
          {{ item.stdout_lines | default([]) }}, expected only
          {{ item.item.server }}:{{ item.item.export }}.
      loop: "{{ _proxmox_cluster_nfs_mount_sources_after.results | default([]) }}"

    - name: Validate Proxmox cluster backup jobs
      ansible.builtin.assert:
        that:
          - item.id is defined
          - item.id | length > 0
          - item.schedule is defined
          - item.schedule | length > 0
          - item.storage is defined
          - item.storage | length > 0
          - item.all | default(false) | bool or item.vmid is defined
        fail_msg: >-
          Proxmox backup job definitions require id, schedule, storage, and
          either all: true or vmid.
      loop: "{{ proxmox_cluster_backup_jobs | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Read Proxmox cluster backup jobs
      ansible.builtin.command:
        argv:
          - pvesh
          - get
          - "/cluster/backup/{{ item.id }}"
          - --output-format
          - json
      register: _proxmox_cluster_backup_job_configs
      changed_when: false
      failed_when: false
      loop: "{{ proxmox_cluster_backup_jobs | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Create missing Proxmox cluster backup jobs
      ansible.builtin.command:
        argv: >-
          {{
            [
              'pvesh',
              'create',
              '/cluster/backup',
              '--id',
              item.item.id,
              '--schedule',
              item.item.schedule,
              '--storage',
              item.item.storage,
              '--mode',
              item.item.mode | default('snapshot'),
              '--compress',
              item.item.compress | default('zstd'),
              '--enabled',
              '1' if item.item.enabled | default(true) | bool else '0'
            ]
            + (['--all', '1'] if item.item.all | default(false) | bool else [])
            + (
              ['--vmid', (item.item.vmid | join(',') if item.item.vmid is sequence and item.item.vmid is not string else item.item.vmid | string)]
              if item.item.vmid is defined
              else []
            )
            + (
              ['--exclude', (item.item.exclude | join(',') if item.item.exclude is sequence and item.item.exclude is not string else item.item.exclude | string)]
              if item.item.exclude is defined
              else []
            )
            + (['--node', item.item.node | string] if item.item.node is defined else [])
            + (['--prune-backups', item.item.prune_backups | string] if item.item.prune_backups is defined else [])
            + (['--repeat-missed', '1' if item.item.repeat_missed | bool else '0'] if item.item.repeat_missed is defined else [])
            + (['--notes-template', item.item.notes_template | string] if item.item.notes_template is defined else [])
            + (['--comment', item.item.comment | string] if item.item.comment is defined else [])
            + (['--mailnotification', item.item.mailnotification | string] if item.item.mailnotification is defined else [])
            + (
              ['--mailto', (item.item.mailto | join(',') if item.item.mailto is sequence and item.item.mailto is not string else item.item.mailto | string)]
              if item.item.mailto is defined
              else []
            )
          }}
      changed_when: true
      loop: "{{ _proxmox_cluster_backup_job_configs.results | default([]) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - item.rc != 0

    - name: Align existing Proxmox cluster backup jobs
      ansible.builtin.command:
        argv: >-
          {{
            [
              'pvesh',
              'set',
              '/cluster/backup/' ~ item.item.id,
              '--schedule',
              item.item.schedule,
              '--storage',
              item.item.storage,
              '--mode',
              item.item.mode | default('snapshot'),
              '--compress',
              item.item.compress | default('zstd'),
              '--enabled',
              '1' if item.item.enabled | default(true) | bool else '0'
            ]
            + (['--all', '1'] if item.item.all | default(false) | bool else [])
            + (
              ['--vmid', (item.item.vmid | join(',') if item.item.vmid is sequence and item.item.vmid is not string else item.item.vmid | string)]
              if item.item.vmid is defined
              else []
            )
            + (
              ['--exclude', (item.item.exclude | join(',') if item.item.exclude is sequence and item.item.exclude is not string else item.item.exclude | string)]
              if item.item.exclude is defined
              else []
            )
            + (['--node', item.item.node | string] if item.item.node is defined else [])
            + (['--prune-backups', item.item.prune_backups | string] if item.item.prune_backups is defined else [])
            + (['--repeat-missed', '1' if item.item.repeat_missed | bool else '0'] if item.item.repeat_missed is defined else [])
            + (['--notes-template', item.item.notes_template | string] if item.item.notes_template is defined else [])
            + (['--comment', item.item.comment | string] if item.item.comment is defined else [])
            + (['--mailnotification', item.item.mailnotification | string] if item.item.mailnotification is defined else [])
            + (
              ['--mailto', (item.item.mailto | join(',') if item.item.mailto is sequence and item.item.mailto is not string else item.item.mailto | string)]
              if item.item.mailto is defined
              else []
            )
          }}
      changed_when: false
      loop: "{{ _proxmox_cluster_backup_job_configs.results | default([]) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - item.rc == 0

    - name: Ensure Proxmox API users exist on the cluster
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - add
          - "{{ item.userid }}"
          - --comment
          - "{{ item.comment | default(item.userid) }}"
          - --enable
          - "{{ 1 if item.enabled | default(true) | bool else 0 }}"
      register: _proxmox_api_user_add
      changed_when: _proxmox_api_user_add.rc == 0
      failed_when: >-
        _proxmox_api_user_add.rc != 0 and
        'already exists' not in ((_proxmox_api_user_add.stdout | default('')) ~ (_proxmox_api_user_add.stderr | default('')))
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: Align Proxmox API user properties
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - modify
          - "{{ item.userid }}"
          - --comment
          - "{{ item.comment | default(item.userid) }}"
          - --enable
          - "{{ 1 if item.enabled | default(true) | bool else 0 }}"
      changed_when: false
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: Grant Proxmox API user permissions
      ansible.builtin.command:
        argv:
          - pveum
          - aclmod
          - "{{ item.acl_path | default('/') }}"
          - -user
          - "{{ item.userid }}"
          - -role
          - "{{ item.role | default('Administrator') }}"
      changed_when: false
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: List existing Proxmox API user tokens
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - token
          - list
          - "{{ item.userid }}"
          - --output-format
          - json
      register: _proxmox_api_token_lists
      changed_when: false
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: Create missing Proxmox API tokens
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - token
          - add
          - "{{ item.0.userid }}"
          - "{{ item.1.token_id }}"
          - --comment
          - "{{ item.1.comment | default(item.1.token_id) }}"
          - --privsep
          - "{{ 1 if item.1.privsep | default(false) | bool else 0 }}"
          - --output-format
          - json
      register: _proxmox_api_token_add
      changed_when: true
      loop: "{{ query('subelements', proxmox_api_users | default([]), 'tokens', {'skip_missing': true}) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - >-
          (
            _proxmox_api_token_lists.results
            | selectattr('item.userid', 'equalto', item.0.userid)
            | map(attribute='stdout')
            | first
            | default('[]', true)
            | from_json
            | selectattr('tokenid', 'equalto', item.1.token_id)
            | list
            | length
          ) == 0
      no_log: true

    - name: Ensure generated Proxmox API token output file exists locally
      ansible.builtin.file:
        path: "{{ proxmox_api_token_output_file }}"
        state: touch
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add is defined
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add.results | default([]) | selectattr('changed') | list | length > 0
      no_log: true

    - name: Save newly generated Proxmox API token secrets locally
      ansible.builtin.lineinfile:
        path: "{{ proxmox_api_token_output_file }}"
        regexp: "^{{ item.item.0.userid | regex_escape }}!{{ item.item.1.token_id | regex_escape }}="
        line: "{{ item.item.0.userid }}!{{ item.item.1.token_id }}={{ (item.stdout | from_json).value }}"
        mode: "0600"
        create: true
      loop: "{{ hostvars[_proxmox_cluster_primary]._proxmox_api_token_add.results | default([]) | selectattr('changed') | list }}"
      delegate_to: localhost
      become: false
      run_once: true
      when: hostvars[_proxmox_cluster_primary]._proxmox_api_token_add is defined
      no_log: true

    - name: Report generated Proxmox API token output file
      ansible.builtin.debug:
        msg: >-
          New Proxmox API token secret(s) were written to
          {{ proxmox_api_token_output_file }}. Copy the required
          user@realm!tokenid=secret value into the appropriate Terraform
          terraform.tfvars file. Existing token secrets cannot be recovered.
      run_once: true
      when:
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add is defined
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add.results | default([]) | selectattr('changed') | list | length > 0
