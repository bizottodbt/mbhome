---
- name: Prepare Proxmox cluster membership
  hosts: "{{ target_hosts | default('proxmox_nodes') }}"
  become: true
  gather_facts: false
  vars:
    proxmox_api_users_file: "{{ playbook_dir }}/../vars/proxmox-api-users.local.yaml"
    proxmox_api_token_output_file: "{{ playbook_dir }}/../vars/proxmox-api-tokens.local.generated"
    _proxmox_cluster_primary: "{{ proxmox_cluster_primary | default(groups['proxmox_nodes'] | first) }}"
    _proxmox_cluster_name: "{{ proxmox_cluster_name | default('mbhome') }}"
    _proxmox_cluster_link_address_var: "{{ proxmox_cluster_link_address_var | default('ansible_host') }}"
    _proxmox_cluster_node_address: "{{ hostvars[inventory_hostname][_proxmox_cluster_link_address_var] | default(ansible_host | default(inventory_hostname)) }}"
    _proxmox_cluster_primary_address: "{{ hostvars[_proxmox_cluster_primary][_proxmox_cluster_link_address_var] | default(hostvars[_proxmox_cluster_primary].ansible_host | default(_proxmox_cluster_primary)) }}"

  pre_tasks:
    - name: Check for local Proxmox API user vars
      ansible.builtin.stat:
        path: "{{ proxmox_api_users_file }}"
      delegate_to: localhost
      become: false
      register: _proxmox_api_users_file

    - name: Load local Proxmox API user vars
      ansible.builtin.include_vars:
        file: "{{ proxmox_api_users_file }}"
      no_log: true
      when: _proxmox_api_users_file.stat.exists

    - name: Require primary node to be in the play
      ansible.builtin.assert:
        that:
          - _proxmox_cluster_primary in ansible_play_hosts
        fail_msg: >-
          Proxmox cluster primary {{ _proxmox_cluster_primary }} is not in this
          play. Include it in LIMIT or set proxmox_cluster_primary correctly.
      run_once: true

    - name: Require cluster node connection addresses
      ansible.builtin.assert:
        that:
          - _proxmox_cluster_node_address | length > 0
        fail_msg: >-
          Missing Proxmox cluster link address for {{ inventory_hostname }}.
          Set ansible_host or {{ _proxmox_cluster_link_address_var }}.

  tasks:
    - name: Keep Proxmox node names resolvable on every cluster member
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} ANSIBLE MANAGED PROXMOX CLUSTER HOSTS"
        block: |
          {% for node in ansible_play_hosts | sort %}
          {{ hostvars[node][_proxmox_cluster_link_address_var] | default(hostvars[node].ansible_host | default(node)) }} {{ node }}
          {% endfor %}

    - name: Check whether node is already clustered
      ansible.builtin.stat:
        path: /etc/pve/corosync.conf
      register: _proxmox_cluster_config

    - name: Record cluster membership state
      ansible.builtin.set_fact:
        _proxmox_is_clustered: "{{ _proxmox_cluster_config.stat.exists | bool }}"

    - name: Ensure root SSH directory exists on join nodes
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Create root SSH key for non-interactive cluster join
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -t
          - ed25519
          - -N
          - ""
          - -f
          - /root/.ssh/id_ed25519
      args:
        creates: /root/.ssh/id_ed25519
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Read join node root SSH public keys
      ansible.builtin.slurp:
        src: /root/.ssh/id_ed25519.pub
      register: _proxmox_join_root_public_key
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Authorize join node root SSH keys on the primary
      ansible.posix.authorized_key:
        user: root
        key: "{{ hostvars[item]._proxmox_join_root_public_key.content | b64decode }}"
        state: present
        comment: "proxmox-cluster-join {{ item }}"
      loop: "{{ ansible_play_hosts | difference([_proxmox_cluster_primary]) }}"
      delegate_to: "{{ _proxmox_cluster_primary }}"
      when:
        - hostvars[item]._proxmox_join_root_public_key is defined
        - not hostvars[item]._proxmox_is_clustered | bool
      run_once: true

    - name: Trust primary host key on join nodes
      ansible.builtin.shell: |
        set -e
        ssh-keygen -R "{{ _proxmox_cluster_primary_address }}" >/dev/null 2>&1 || true
        ssh-keyscan -H "{{ _proxmox_cluster_primary_address }}" >> /root/.ssh/known_hosts
      args:
        executable: /bin/bash
      changed_when: true
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Create Proxmox cluster on primary
      ansible.builtin.command:
        argv:
          - pvecm
          - create
          - "{{ _proxmox_cluster_name }}"
          - --link0
          - "{{ _proxmox_cluster_node_address }}"
      register: _proxmox_cluster_create
      changed_when: true
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Wait for primary cluster filesystem
      ansible.builtin.wait_for:
        path: /etc/pve/corosync.conf
        timeout: 120
      when:
        - inventory_hostname == _proxmox_cluster_primary

    - name: Join Proxmox cluster from secondary nodes
      ansible.builtin.command:
        argv:
          - pvecm
          - add
          - "{{ _proxmox_cluster_primary_address }}"
          - --use_ssh
          - "1"
          - --link0
          - "{{ _proxmox_cluster_node_address }}"
      register: _proxmox_cluster_join
      changed_when: true
      throttle: 1
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Print Proxmox cluster join output
      ansible.builtin.debug:
        msg: "{{ (_proxmox_cluster_join.stdout_lines | default([])) + (_proxmox_cluster_join.stderr_lines | default([])) }}"
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - _proxmox_cluster_join is defined
        - _proxmox_cluster_join is changed

    - name: Wait for secondary cluster filesystem
      ansible.builtin.wait_for:
        path: /etc/pve/corosync.conf
        timeout: 180
      when:
        - inventory_hostname != _proxmox_cluster_primary
        - not _proxmox_is_clustered | bool

    - name: Refresh cluster membership state
      ansible.builtin.stat:
        path: /etc/pve/corosync.conf
      register: _proxmox_cluster_config_after

    - name: Confirm every target node is clustered
      ansible.builtin.assert:
        that:
          - _proxmox_cluster_config_after.stat.exists
        fail_msg: "{{ inventory_hostname }} is not clustered after proxmox-cluster run."
        success_msg: "{{ inventory_hostname }} is clustered."

    - name: Show Proxmox cluster status
      ansible.builtin.command:
        argv:
          - pvecm
          - status
      register: _proxmox_cluster_status
      changed_when: false
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Print Proxmox cluster status
      ansible.builtin.debug:
        var: _proxmox_cluster_status.stdout_lines
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Configure Proxmox cluster migration settings
      ansible.builtin.command:
        argv:
          - pvesh
          - set
          - /cluster/options
          - --migration
          - >-
            {{
              (
                ['type=' ~ (proxmox_cluster_migration.type | default('secure'))]
                + (
                  ['network=' ~ proxmox_cluster_migration.network]
                  if proxmox_cluster_migration.network | default('') | length > 0
                  else []
                )
              ) | join(',')
            }}
      changed_when: false
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - proxmox_cluster_migration is defined

    - name: Check Proxmox cluster NFS storage definitions
      ansible.builtin.command:
        argv:
          - pvesm
          - status
          - --storage
          - "{{ item.storage }}"
      register: _proxmox_cluster_nfs_storage_status
      changed_when: false
      failed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Add missing Proxmox cluster NFS storages
      ansible.builtin.command:
        argv: >-
          {{
            [
              'pvesm',
              'add',
              'nfs',
              item.item.storage,
              '--server',
              item.item.server,
              '--export',
              item.item.export,
              '--content',
              item.item.content | default(['images']) | join(',')
            ]
            + (['--options', item.item.options] if item.item.options is defined else [])
            + (['--nodes', item.item.nodes | join(',')] if item.item.nodes is defined else [])
          }}
      changed_when: true
      loop: "{{ _proxmox_cluster_nfs_storage_status.results | default([]) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - item.rc != 0

    - name: Align Proxmox cluster NFS storage content and options
      ansible.builtin.command:
        argv: >-
          {{
            [
              'pvesm',
              'set',
              item.storage,
              '--content',
              item.content | default(['images']) | join(',')
            ]
            + (['--options', item.options] if item.options is defined else [])
            + (['--nodes', item.nodes | join(',')] if item.nodes is defined else [])
          }}
      changed_when: false
      loop: "{{ proxmox_cluster_nfs_storages | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary

    - name: Ensure Proxmox API users exist on the cluster
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - add
          - "{{ item.userid }}"
          - --comment
          - "{{ item.comment | default(item.userid) }}"
          - --enable
          - "{{ 1 if item.enabled | default(true) | bool else 0 }}"
      register: _proxmox_api_user_add
      changed_when: _proxmox_api_user_add.rc == 0
      failed_when: >-
        _proxmox_api_user_add.rc != 0 and
        'already exists' not in ((_proxmox_api_user_add.stdout | default('')) ~ (_proxmox_api_user_add.stderr | default('')))
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: Align Proxmox API user properties
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - modify
          - "{{ item.userid }}"
          - --comment
          - "{{ item.comment | default(item.userid) }}"
          - --enable
          - "{{ 1 if item.enabled | default(true) | bool else 0 }}"
      changed_when: false
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: Grant Proxmox API user permissions
      ansible.builtin.command:
        argv:
          - pveum
          - aclmod
          - "{{ item.acl_path | default('/') }}"
          - -user
          - "{{ item.userid }}"
          - -role
          - "{{ item.role | default('Administrator') }}"
      changed_when: false
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: List existing Proxmox API user tokens
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - token
          - list
          - "{{ item.userid }}"
          - --output-format
          - json
      register: _proxmox_api_token_lists
      changed_when: false
      loop: "{{ proxmox_api_users | default([]) }}"
      when: inventory_hostname == _proxmox_cluster_primary
      no_log: true

    - name: Create missing Proxmox API tokens
      ansible.builtin.command:
        argv:
          - pveum
          - user
          - token
          - add
          - "{{ item.0.userid }}"
          - "{{ item.1.token_id }}"
          - --comment
          - "{{ item.1.comment | default(item.1.token_id) }}"
          - --privsep
          - "{{ 1 if item.1.privsep | default(false) | bool else 0 }}"
          - --output-format
          - json
      register: _proxmox_api_token_add
      changed_when: true
      loop: "{{ query('subelements', proxmox_api_users | default([]), 'tokens', {'skip_missing': true}) }}"
      when:
        - inventory_hostname == _proxmox_cluster_primary
        - >-
          (
            _proxmox_api_token_lists.results
            | selectattr('item.userid', 'equalto', item.0.userid)
            | map(attribute='stdout')
            | first
            | default('[]', true)
            | from_json
            | selectattr('tokenid', 'equalto', item.1.token_id)
            | list
            | length
          ) == 0
      no_log: true

    - name: Ensure generated Proxmox API token output file exists locally
      ansible.builtin.file:
        path: "{{ proxmox_api_token_output_file }}"
        state: touch
        mode: "0600"
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add is defined
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add.results | default([]) | selectattr('changed') | list | length > 0
      no_log: true

    - name: Save newly generated Proxmox API token secrets locally
      ansible.builtin.lineinfile:
        path: "{{ proxmox_api_token_output_file }}"
        regexp: "^{{ item.item.0.userid | regex_escape }}!{{ item.item.1.token_id | regex_escape }}="
        line: "{{ item.item.0.userid }}!{{ item.item.1.token_id }}={{ (item.stdout | from_json).value }}"
        mode: "0600"
        create: true
      loop: "{{ hostvars[_proxmox_cluster_primary]._proxmox_api_token_add.results | default([]) | selectattr('changed') | list }}"
      delegate_to: localhost
      become: false
      run_once: true
      when: hostvars[_proxmox_cluster_primary]._proxmox_api_token_add is defined
      no_log: true

    - name: Report generated Proxmox API token output file
      ansible.builtin.debug:
        msg: >-
          New Proxmox API token secret(s) were written to
          {{ proxmox_api_token_output_file }}. Copy the required
          user@realm!tokenid=secret value into the appropriate Terraform
          terraform.tfvars file. Existing token secrets cannot be recovered.
      run_once: true
      when:
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add is defined
        - hostvars[_proxmox_cluster_primary]._proxmox_api_token_add.results | default([]) | selectattr('changed') | list | length > 0
