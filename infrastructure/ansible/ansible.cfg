[defaults]
inventory         = inventory/hosts.yaml
roles_path        = roles
host_key_checking = True
remote_user       = root
stdout_callback   = default
result_format     = yaml
# interpreter discovery can be slow on Unraid; pin it
interpreter_python = /usr/bin/python3

[ssh_connection]
# Enable SSH multiplexing for faster subsequent task connections
ssh_args    = -o ControlMaster=auto -o ControlPersist=30m
pipelining  = True
