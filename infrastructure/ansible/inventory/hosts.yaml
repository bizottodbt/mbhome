---
all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3

  children:
    unraid:
      hosts:
        mbhome-nas-01:
          ansible_user: root

    openstack:
      hosts:
        openstack:
          ansible_user: "{{ lookup('env', 'USER') }}"

    proxmox_nodes:
      vars:
        proxmox_dns_search: "{{ homelab_dns_search | default('lan') }}"
        proxmox_dns_servers: []
        proxmox_nfs_mounts:
          # Enable in inventory/hosts.local.yaml after the Unraid export exists.
          - path: /mnt/proxmox-vms
            src: /mnt/user/proxmox-vms
            enabled: false
          - path: /mnt/proxmox-backup
            src: /mnt/user/proxmox-backup
            enabled: false
          - path: /mnt/proxmox-snippets
            src: /mnt/user/proxmox-snippets
            enabled: false
          - path: /mnt/proxmox-isos
            src: /mnt/user/proxmox-isos
            enabled: false
      hosts:
        mbhome-proxmox-01:
          proxmox_10gbe_links: []

        mbhome-proxmox-02:
          proxmox_10gbe_links: []

        mbhome-proxmox-03:
          proxmox_10gbe_links: []

    k3s_control_plane:
      hosts: {}  # TODO: populate after Terraform provisions VMs (Phase 2)

    k3s_workers:
      hosts: {}  # TODO: populate after Terraform provisions VMs (Phase 2)
