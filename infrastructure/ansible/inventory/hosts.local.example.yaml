---
# Copy to hosts.local.yaml and fill in values for your own network.
# hosts.local.yaml is git-ignored and is automatically loaded by Make targets.
all:
  children:
    unraid:
      hosts:
        mbhome-nas-01:
          ansible_host: 192.0.2.48

    openstack:
      hosts:
        openstack:
          ansible_host: 192.0.2.10

    bmc_controllers:
      vars:
        bmc_validate_certs: false
      children:
        bmc_mj11:
          vars:
            bmc_username: admin
            bmc_password: CHANGE_ME_MJ11
            bmc_profile: gigabyte_mj11_ec1
            bmc_manage_fan_profile: true
            bmc_user_provider: web_api
          hosts:
            mbhome-proxmox-01-bmc:
              bmc_address: https://192.0.2.20
              bmc_managed_host: mbhome-proxmox-01
            mbhome-proxmox-02-bmc:
              bmc_address: https://192.0.2.21
              bmc_managed_host: mbhome-proxmox-02
            mbhome-proxmox-03-bmc:
              bmc_address: https://192.0.2.22
              bmc_managed_host: mbhome-proxmox-03

        bmc_asrock_d1541d4u_2t8r:
          vars:
            bmc_username: admin
            bmc_password: CHANGE_ME_ASROCK
            bmc_profile: asrock_d1541d4u_2t8r
            bmc_manage_fan_profile: false
            bmc_user_provider: ipmi
            bmc_ipmi_interface: lanplus
            bmc_ipmi_channel: 1
            bmc_ipmi_min_user_id: 2
          hosts:
            mbhome-nas-01-bmc:
              bmc_address: https://192.0.2.49
              bmc_managed_host: mbhome-nas-01

    proxmox_nodes:
      vars:
        proxmox_dns_servers:
          - 192.0.2.1
        proxmox_cluster_name: mbhome
        proxmox_cluster_primary: mbhome-proxmox-01
        proxmox_cluster_link_address_var: ansible_host
        proxmox_cluster_migration:
          network: 192.0.2.0/24
          type: secure
        proxmox_cluster_nfs_storages:
          - storage: proxmox-vms
            server: 192.0.2.48
            export: /mnt/user/proxmox-vms
            content:
              - images
              - rootdir

          - storage: proxmox-isos
            server: 192.0.2.48
            export: /mnt/user/proxmox-isos
            content:
              - iso
              - vztmpl

          - storage: proxmox-snippets
            server: 192.0.2.48
            export: /mnt/user/proxmox-snippets
            content:
              - snippets

          - storage: proxmox-backup
            server: 192.0.2.48
            export: /mnt/user/proxmox-backup
            content:
              - backup
        proxmox_10gbe_mtu: 1500
        proxmox_storage_content:
          - storage: local
            content:
              - backup
              - import
              - images
              - iso
              - rootdir
              - snippets
              - vztmpl
        proxmox_vm_bridges:
          - name: vmbr0
            # Optional: set this to the management NIC MAC if your router DHCP
            # reservation should keep following the bridged management address.
            # mac: 00:00:00:00:00:01
            ports:
              - enp3s0
            dhcp4: true
            link_local: false
            ipv6_accept_ra: false
        proxmox_nfs_mounts: []
      hosts:
        mbhome-proxmox-01:
          ansible_host: 192.0.2.51
          bmc_inventory_host: mbhome-proxmox-01-bmc
          proxmox_10gbe_links:
            - interface: enp5s0f0
              address: 198.51.100.11
              prefix: 24
              purpose: switched-storage-vlan90

        mbhome-proxmox-02:
          ansible_host: 192.0.2.52
          bmc_inventory_host: mbhome-proxmox-02-bmc
          proxmox_10gbe_links:
            - interface: enp5s0f0
              address: 198.51.100.12
              prefix: 24
              purpose: switched-storage-vlan90

        mbhome-proxmox-03:
          ansible_host: 192.0.2.53
          bmc_inventory_host: mbhome-proxmox-03-bmc
          proxmox_10gbe_links: []

    windows_domain_controllers:
      vars:
        ansible_connection: winrm
        ansible_user: Administrator
        ansible_password: CHANGE_ME_WINDOWS_ADMIN
        ansible_port: 5985
        ansible_winrm_scheme: http
        ansible_winrm_transport: ntlm
        windows_prefix_length: 24
        windows_gateway: 192.0.2.1
        windows_disable_ipv6: true
        windows_enable_rdp: true
        windows_disable_spice_agent: true
        windows_dc_install_features: true
        windows_ad_domain_name: ad.example.test
        windows_ad_domain_admin_user: Administrator@ad.example.test
        windows_ad_domain_netbios_name: AD
        windows_ad_safe_mode_password: CHANGE_ME_DSRM
        windows_ad_domain_admin_user: Administrator@ad.example.test
        windows_ad_domain_admin_password: CHANGE_ME_DOMAIN_ADMIN
        windows_ad_replica_dns_client_servers:
          - 192.0.2.61
          - 192.0.2.62
        windows_ad_primary_dns_client_servers:
          - 192.0.2.62
          - 192.0.2.61
        windows_ad_domain_mode: WinThreshold
        windows_ad_forest_mode: WinThreshold
        windows_dns_servers:
          - 192.0.2.1
      hosts:
        mbhome-ad-01:
          ansible_host: 192.0.2.61
          windows_hostname: mbhome-ad-01
          windows_static_ip: 192.0.2.61

        mbhome-ad-02:
          ansible_host: 192.0.2.62
          windows_hostname: mbhome-ad-02
          windows_static_ip: 192.0.2.62

    windows_ad_primary:
      hosts:
        mbhome-ad-01: {}

    windows_ad_replicas:
      hosts:
        mbhome-ad-02: {}
