# Copy this file to bmc-users.local.yaml and replace the example values.
# bmc-users.local.yaml is git-ignored because it contains BMC credentials.
#
# These users are managed only on the BMC web UI. They are intentionally
# separate from Proxmox/Linux users so BMC access can be bootstrapped before
# OpenStack/Ironic deploys an operating system to the node.
bmc_admin_users:
  - name: bizotto
    # MJ11/AMI web API passwords should be 6-16 characters. Some BMCs return
    # HTTP 500 instead of a useful validation error for longer passwords.
    password: "CHANGE_ME"
    email: "YOUR_EMAIL_HERE"
    # Optional. Used by web/API managed BMCs; the first key is written to the
    # BMC ssh_key field.
    ssh_public_keys:
      - "ssh-ed25519 replace-with-real-public-key bmc-admin"
    enabled: true
