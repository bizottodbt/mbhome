---
# Copy to dns.yaml when starting a new environment, then commit the desired
# records if they only contain topology such as IPs, CIDRs, and DNS names.
forwarders:
  - 192.0.2.1
  - 1.1.1.1
  - 8.8.8.8

zones:
  - name: ad.example
    records:
      - name: k8s-api
        type: A
        value: 192.0.2.50
        ttl: 300
        state: present

      - name: talos-cp-01
        type: A
        value: 192.0.2.70
        ttl: 300
        state: present

      - name: unraid
        type: A
        value: 192.0.2.50
        ttl: 300
        state: present
