# flux bootstrap resets this file to only gotk-components + gotk-sync.
# After bootstrap, re-add the entries below and commit.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml   # generated by flux bootstrap — do not edit manually
  - gotk-sync.yaml         # generated by flux bootstrap — do not edit manually
  - cluster-secrets.yaml   # must reconcile before metallb/tinkerbell (substituteFrom)
  - metallb.yaml
  - tinkerbell.yaml
