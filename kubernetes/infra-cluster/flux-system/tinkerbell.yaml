apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tinkerbell
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/infra-cluster/infrastructure/tinkerbell
  prune: true
  deletionPolicy: WaitForTermination
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: metallb
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  wait: true
  timeout: 10m0s
