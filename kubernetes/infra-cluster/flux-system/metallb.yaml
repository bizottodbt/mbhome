apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/infra-cluster/infrastructure/metallb
  prune: true
  deletionPolicy: WaitForTermination
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cluster-secrets
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  wait: true
  timeout: 5m0s
