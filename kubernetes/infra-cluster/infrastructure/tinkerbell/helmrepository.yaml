# OCIRepository for the Tinkerbell stack Helm chart.
# Verify/update the tag: helm show chart oci://ghcr.io/tinkerbell/charts/stack
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tinkerbell
  namespace: tink-system
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: "0.9.0"  # TODO: pin to verified latest
  url: oci://ghcr.io/tinkerbell/charts/stack
