# METALLB_LB_RANGE is substituted by Flux from cluster-secrets (default: 10.20.30.200-10.20.30.210).
# Ensure this range is outside your router/DHCP lease range.
# 10.20.30.200 is dedicated to the Tinkerbell stack.
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: infra-pool
  namespace: metallb-system
spec:
  addresses:
    - "${METALLB_LB_RANGE}"
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: infra-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - infra-pool
