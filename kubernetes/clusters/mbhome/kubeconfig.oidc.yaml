apiVersion: v1
clusters:
- cluster:
    certificate-authority-data: 
    server: https://k8s-api.mbhome.biz:6443
  name: mbhome
contexts:
- context:
    cluster: mbhome
    user: oidc
  name: oidc@mbhome
current-context: oidc@mbhome
kind: Config
users:
- name: oidc
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1
      args:
      - oidc-login
      - get-token
      - --oidc-issuer-url=https://dex.apps.mbhome.biz
      - --oidc-client-id=kubernetes
      - --skip-open-browser
      - --oidc-extra-scope=email
      - --oidc-extra-scope=groups
      - --oidc-extra-scope=profile
      command: kubectl
      env: null
      interactiveMode: IfAvailable
      provideClusterInfo: false
