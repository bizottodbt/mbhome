---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: flux-system
spec:
  interval: 30m
  releaseName: vault
  targetNamespace: vault
  chart:
    spec:
      chart: vault
      version: 0.34.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      tlsDisable: true

    injector:
      enabled: false

    server:
      image:
        repository: hashicorp/vault
        tag: 2.0.3

      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          memory: 1Gi

      readinessProbe:
        enabled: true
        path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
        port: 8200
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 6

      dataStorage:
        enabled: true
        storageClass: nfs-cache
        accessMode: ReadWriteOnce
        size: 10Gi

      auditStorage:
        enabled: true
        storageClass: nfs-cache
        accessMode: ReadWriteOnce
        size: 5Gi

      standalone:
        enabled: false

      ha:
        enabled: true
        replicas: 1
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            disable_mlock = true

            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
              telemetry {
                unauthenticated_metrics_access = "true"
              }
            }

            storage "raft" {
              path = "/vault/data"
            }

            service_registration "kubernetes" {}

            telemetry {
              prometheus_retention_time = "30s"
              disable_hostname = true
            }

      statefulSet:
        securityContext:
          pod:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          container:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

    ui:
      enabled: true
      activeVaultPodOnly: true
      serviceType: ClusterIP

    serverTelemetry:
      serviceMonitor:
        enabled: true
        selectors:
          release: kube-prometheus-stack
