---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: flux-system
spec:
  interval: 30m
  releaseName: dex
  targetNamespace: dex
  chart:
    spec:
      chart: dex
      version: 0.24.1
      sourceRef:
        kind: HelmRepository
        name: dex
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    envFrom:
      - secretRef:
          name: dex-ldap-bind
      - secretRef:
          name: dex-postgres-app
      - secretRef:
          name: dex-grafana-client
      - secretRef:
          name: dex-vault-client
    replicaCount: 2
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    config:
      issuer: https://dex.apps.mbhome.biz
      storage:
        type: postgres
        config:
          host: dex-postgres-rw.dex.svc.cluster.local
          port: 5432
          database: dex
          user: dex
          password: "{{ .Env.password }}"
          ssl:
            mode: require
      web:
        http: 0.0.0.0:5556
      oauth2:
        skipApprovalScreen: true
      expiry:
        signingKeys: 24h
        idTokens: 1h
        authRequests: 10m
        deviceRequests: 5m
        refreshTokens:
          validIfNotUsedFor: 168h
          absoluteLifetime: 720h
          reuseInterval: 3s
          disableRotation: false
      staticClients:
        - id: kubernetes
          public: true
          name: Kubernetes CLI
          redirectURIs:
            - http://localhost:8000
            - http://localhost:18000
            - http://127.0.0.1:8000
            - http://127.0.0.1:18000
        - id: grafana
          secret: "{{ .Env.DEX_GRAFANA_CLIENT_SECRET }}"
          name: Grafana
          redirectURIs:
            - https://grafana.apps.mbhome.biz/login/generic_oauth
        - id: vault
          secret: "{{ .Env.DEX_VAULT_CLIENT_SECRET }}"
          name: Vault
          redirectURIs:
            - https://vault.apps.mbhome.biz/ui/vault/auth/oidc/oidc/callback
            - http://localhost:8250/oidc/callback
      connectors:
        - type: ldap
          id: ad
          name: Active Directory
          config:
            host: mbhome.biz:636
            insecureNoSSL: false
            # TODO: replace with rootCAData after AD CS issues trusted DC certs.
            insecureSkipVerify: true
            bindDN: "{{ .Env.DEX_LDAP_BIND_DN }}"
            bindPW: "{{ .Env.DEX_LDAP_BIND_PASSWORD }}"
            usernamePrompt: Email Address
            userSearch:
              baseDN: OU=Users,OU=home,DC=mbhome,DC=biz
              filter: "(objectClass=person)"
              username: userPrincipalName
              idAttr: DN
              emailAttr: userPrincipalName
              nameAttr: cn
              preferredUsernameAttr: sAMAccountName
            groupSearch:
              baseDN: OU=Groups,OU=home,DC=mbhome,DC=biz
              filter: "(objectClass=group)"
              userMatchers:
                - userAttr: DN
                  groupAttr: member
              nameAttr: cn
