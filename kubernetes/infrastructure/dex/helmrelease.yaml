---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: flux-system
spec:
  interval: 30m
  releaseName: dex
  targetNamespace: dex
  chart:
    spec:
      chart: dex
      version: 0.24.1
      sourceRef:
        kind: HelmRepository
        name: dex
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    envFrom:
      - secretRef:
          name: dex-ldap-bind
    # Dex memory storage keeps login request state inside one pod. Use a single
    # replica until Dex is moved to a shared storage backend.
    replicaCount: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    config:
      issuer: https://dex.apps.mbhome.biz
      storage:
        type: memory
      web:
        http: 0.0.0.0:5556
      oauth2:
        skipApprovalScreen: true
      expiry:
        signingKeys: 24h
        idTokens: 1h
        authRequests: 10m
        deviceRequests: 5m
        refreshTokens:
          validIfNotUsedFor: 168h
          absoluteLifetime: 720h
          reuseInterval: 3s
          disableRotation: false
      staticClients:
        - id: kubernetes
          public: true
          name: Kubernetes CLI
          redirectURIs:
            - http://localhost:8000
            - http://localhost:18000
            - http://127.0.0.1:8000
            - http://127.0.0.1:18000
      connectors:
        - type: ldap
          id: ad
          name: Active Directory
          config:
            host: mbhome.biz:636
            insecureNoSSL: false
            # TODO: replace with rootCAData after AD CS issues trusted DC certs.
            insecureSkipVerify: true
            bindDN: "{{ .Env.DEX_LDAP_BIND_DN }}"
            bindPW: "{{ .Env.DEX_LDAP_BIND_PASSWORD }}"
            usernamePrompt: Email Address
            userSearch:
              baseDN: OU=Users,OU=home,DC=mbhome,DC=biz
              filter: "(objectClass=person)"
              username: userPrincipalName
              idAttr: DN
              emailAttr: userPrincipalName
              nameAttr: cn
              preferredUsernameAttr: sAMAccountName
            groupSearch:
              baseDN: OU=Groups,OU=home,DC=mbhome,DC=biz
              filter: "(objectClass=group)"
              userMatchers:
                - userAttr: DN
                  groupAttr: member
              nameAttr: cn
