---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: flux-system
spec:
  interval: 30m
  releaseName: dex
  targetNamespace: dex
  chart:
    spec:
      chart: dex
      version: 0.24.1
      sourceRef:
        kind: HelmRepository
        name: dex
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    envFrom:
      - secretRef:
          name: dex-ldap-bind
    replicaCount: 2
    config:
      issuer: https://dex.apps.mbhome.biz
      storage:
        type: memory
      web:
        http: 0.0.0.0:5556
      oauth2:
        skipApprovalScreen: true
      staticClients:
        - id: kubernetes
          public: true
          name: Kubernetes CLI
          redirectURIs:
            - http://localhost:8000
            - http://localhost:18000
            - http://127.0.0.1:8000
            - http://127.0.0.1:18000
      connectors:
        - type: ldap
          id: ad
          name: Active Directory
          config:
            host: mbhome.biz:636
            insecureNoSSL: false
            insecureSkipVerify: true
            bindDN: "{{ .Env.DEX_LDAP_BIND_DN }}"
            bindPW: "{{ .Env.DEX_LDAP_BIND_PASSWORD }}"
            usernamePrompt: Email Address
            userSearch:
              baseDN: OU=Users,OU=home,DC=mbhome,DC=biz
              filter: "(objectClass=person)"
              username: userPrincipalName
              idAttr: DN
              emailAttr: userPrincipalName
              nameAttr: cn
              preferredUsernameAttr: sAMAccountName
            groupSearch:
              baseDN: OU=Groups,OU=home,DC=mbhome,DC=biz
              filter: "(objectClass=group)"
              userMatchers:
                - userAttr: DN
                  groupAttr: member
              nameAttr: cn
