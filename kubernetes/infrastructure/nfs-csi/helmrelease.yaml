---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: flux-system
spec:
  interval: 30m
  releaseName: csi-driver-nfs
  targetNamespace: kube-system
  chart:
    spec:
      chart: csi-driver-nfs
      version: 4.13.4
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      enableSnapshotter: false
      replicas: 2
      runOnControlPlane: false
    storageClass:
      create: false
    externalSnapshotter:
      enabled: false
