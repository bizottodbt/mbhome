---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 30m
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.17.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    fullnameOverride: kube-prometheus-stack

    kubeProxy:
      enabled: false

    kubeEtcd:
      enabled: false

    defaultRules:
      rules:
        etcd: false
        kubeProxy: false

    prometheus-node-exporter:
      namespaceOverride: kube-system

    grafana:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      grafana.ini:
        server:
          root_url: https://grafana.apps.mbhome.biz
        auth:
          disable_login_form: false
        auth.generic_oauth:
          enabled: true
          name: Dex
          allow_sign_up: true
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid email profile groups
          auth_url: https://dex.apps.mbhome.biz/auth
          token_url: https://dex.apps.mbhome.biz/token
          api_url: https://dex.apps.mbhome.biz/userinfo
          login_attribute_path: preferred_username
          name_attribute_path: name
          email_attribute_path: email
          groups_attribute_path: groups
          role_attribute_path: >-
            contains(groups[*], 'grafana-admins') && 'GrafanaAdmin' ||
            contains(groups[*], 'grafana-editors') && 'Editor' ||
            contains(groups[*], 'grafana-viewers') && 'Viewer' ||
            contains(groups[*], 'k8s-admins') && 'GrafanaAdmin' ||
            contains(groups[*], 'k8s-viewers') && 'Viewer' ||
            ''
          role_attribute_strict: true
          allow_assign_grafana_admin: true
          use_refresh_token: true
      envFromSecret: grafana-oauth
      persistence:
        enabled: true
        type: sts
        storageClassName: nfs-cache
        accessModes:
          - ReadWriteOnce
        size: 5Gi

    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.apps.mbhome.biz
        retention: 15d
        retentionSize: 20GB
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        ruleNamespaceSelector: {}
        probeNamespaceSelector: {}
        scrapeConfigNamespaceSelector: {}
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-cache
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    alertmanager:
      alertmanagerSpec:
        externalUrl: https://alertmanager.apps.mbhome.biz
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-cache
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi
