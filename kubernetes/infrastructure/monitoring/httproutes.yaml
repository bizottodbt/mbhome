      namespace: gateway-system
      sectionName: https
  hostnames:
    - prometheus.apps.mbhome.biz
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
