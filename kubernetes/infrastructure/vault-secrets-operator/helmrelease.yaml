---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-secrets-operator
  namespace: flux-system
spec:
  interval: 30m
  releaseName: vault-secrets-operator
  targetNamespace: vault-secrets-operator
  dependsOn:
    - name: vault
      namespace: flux-system
  chart:
    spec:
      chart: vault-secrets-operator
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    controller:
      replicas: 1
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
    defaultVaultConnection:
      enabled: true
      address: http://vault-active.vault.svc.cluster.local:8200
    defaultAuthMethod:
      enabled: true
      method: kubernetes
      mount: kubernetes
      kubernetes:
        role: vault-secrets-operator
        serviceAccount: vault-sync
        tokenAudiences:
          - vault
    hooks:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
