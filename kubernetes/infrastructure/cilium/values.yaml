---
# Talos-specific Cilium values.
#
# Talos already mounts cgroupv2 and bpffs, and Kubernetes workloads cannot load
# kernel modules. Keep SYS_MODULE out of the default Cilium capability set.
ipam:
  mode: kubernetes

kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

gatewayAPI:
  enabled: true
  gatewayClass:
    create: "true"

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

l2announcements:
  enabled: true

k8sClientRateLimit:
  qps: 20
  burst: 40

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

operator:
  replicas: 1
