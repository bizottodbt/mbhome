creation_rules:
  # Files named *.sops.yaml — encrypts only data/stringData fields.
  # mac_only_encrypted keeps diffs readable; SOPS MAC still covers all fields.
  - path_regex: kubernetes/.*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    mac_only_encrypted: true
    age: >-
      age1n75t4055ewdzjnuw7zp88vl0p2wxggyzqwur0zfaj2q0hgpek5nqztf6lp
  - path_regex: infrastructure/terraform/.*\.sops\.tfvars$
    mac_only_encrypted: true
    age: >-
      age1n75t4055ewdzjnuw7zp88vl0p2wxggyzqwur0zfaj2q0hgpek5nqztf6lp
stores:
  yaml:
    indent: 2
